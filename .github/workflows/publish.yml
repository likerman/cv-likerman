name: Publicar CV bilingüe

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "_quarto.yml"
      - "index.qmd"
      - "en/**"
      - "styles.css"
      - "profile.png"
      - "cv.pdf"
      - "CV_JSPS_English/**"
      - ".github/workflows/publish.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v6

      - name: Configurar Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Verificar Quarto
        run: quarto check

      - name: Renderizar sitio
        run: quarto render --log-level info

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v6

      - name: Subir sitio para GitHub Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
