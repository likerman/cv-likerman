name: Publicar CV bilingüe

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "_quarto.yml"
      - "index.qmd"
      - "en/**"
      - "styles.css"
      - "profile.png"
      - "cv.tex"
      - "cv/**"
      - "bibliography.bib"
      - "awesome-cv.cls"
      - "fonts/**"
      - "CV_JSPS_English/*.tex"
      - "CV_JSPS_English/fonts"
      - ".github/workflows/publish.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Instalar TeX Live y fuentes
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            latexmk biber \
            texlive-xetex texlive-luatex \
            texlive-latex-extra texlive-fonts-extra \
            texlive-fonts-recommended texlive-lang-spanish \
            fonts-font-awesome fonts-urw-base35 fontconfig
          fc-cache -f -v
          fc-match FontAwesome
          kpsewhich pzdr.tfm

      - name: Compilar CV en español
        run: latexmk -xelatex -file-line-error -halt-on-error -interaction=nonstopmode cv.tex

      - name: Compilar CV en inglés
        working-directory: CV_JSPS_English
        run: latexmk -lualatex -file-line-error -halt-on-error -interaction=nonstopmode main.tex

      - name: Preparar y verificar los PDF
        run: |
          cp CV_JSPS_English/main.pdf CV_JSPS_English/Jeremias_Likerman_CV_JSPS.pdf
          test -s cv.pdf
          test -s CV_JSPS_English/Jeremias_Likerman_CV_JSPS.pdf
          ls -lh cv.pdf CV_JSPS_English/Jeremias_Likerman_CV_JSPS.pdf

      - name: Guardar los PDF actualizados en el repositorio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cv.pdf CV_JSPS_English/Jeremias_Likerman_CV_JSPS.pdf
          if ! git diff --cached --quiet; then
            git commit -m "Actualiza los PDF del CV [skip ci]"
            git push
          fi

      - name: Configurar Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Verificar Quarto
        run: quarto check

      - name: Renderizar sitio
        run: quarto render --log-level info

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v6

      - name: Subir sitio para GitHub Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
