name: Publicar CV bilingüe

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "_quarto.yml"
      - "index.qmd"
      - "en/**"
      - "styles.css"
      - "profile.png"
      - "cv.tex"
      - "cv/**"
      - "bibliography.bib"
      - "awesome-cv.cls"
      - "fonts/**"
      - "CV_JSPS_English/*.tex"
      - "CV_JSPS_English/fonts"
      - ".github/workflows/publish.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Instalar TeX Live, fuentes y herramientas PDF
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            latexmk biber poppler-utils \
            texlive-xetex texlive-luatex \
            texlive-latex-extra texlive-bibtex-extra texlive-fonts-extra \
            texlive-fonts-recommended texlive-lang-spanish \
            fonts-font-awesome fonts-urw-base35 fontconfig
          fc-cache -f -v
          fc-match FontAwesome
          kpsewhich pzdr.tfm
          kpsewhich biblatex.sty

      - name: Compilar CV en español
        run: latexmk -xelatex -file-line-error -halt-on-error -interaction=nonstopmode cv.tex

      - name: Compilar CV en inglés
        working-directory: CV_JSPS_English
        run: latexmk -lualatex -file-line-error -halt-on-error -interaction=nonstopmode main.tex

      - name: Preparar y verificar los PDF
        shell: bash
        run: |
          set -euo pipefail
          cp CV_JSPS_English/main.pdf CV_JSPS_English/Jeremias_Likerman_CV_JSPS.pdf
          test -s cv.pdf
          test -s CV_JSPS_English/Jeremias_Likerman_CV_JSPS.pdf

          revisar_pdf() {
            local archivo="$1"
            local prefijo="$2"
            local paginas
            local minimo=999999
            paginas=$(pdfinfo "$archivo" | awk '/^Pages:/ {print $2}')
            echo "$archivo: $paginas páginas"

            for pagina in $(seq 1 "$paginas"); do
              palabras=$(pdftotext -f "$pagina" -l "$pagina" "$archivo" - | wc -w | tr -d ' ')
              echo "  página $pagina: $palabras palabras"
              if [ "$palabras" -lt "$minimo" ]; then
                minimo="$palabras"
              fi
              if [ "$palabras" -lt 8 ]; then
                echo "::error file=$archivo::La página $pagina está prácticamente vacía ($palabras palabras)."
                exit 1
              elif [ "$palabras" -lt 35 ]; then
                echo "::warning file=$archivo::La página $pagina tiene poco contenido ($palabras palabras); revisar paginación."
              fi
            done

            echo "PAGES_${prefijo}=$paginas" >> "$GITHUB_ENV"
            echo "MIN_${prefijo}=$minimo" >> "$GITHUB_ENV"
          }

          revisar_pdf cv.pdf ES
          revisar_pdf CV_JSPS_English/Jeremias_Likerman_CV_JSPS.pdf EN
          ls -lh cv.pdf CV_JSPS_English/Jeremias_Likerman_CV_JSPS.pdf

      - name: Guardar los PDF actualizados en el repositorio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cv.pdf CV_JSPS_English/Jeremias_Likerman_CV_JSPS.pdf
          if ! git diff --cached --quiet; then
            git commit -m "Actualiza los PDF del CV (ES: ${PAGES_ES} pág., mínimo ${MIN_ES} palabras; EN: ${PAGES_EN} pág., mínimo ${MIN_EN} palabras) [skip ci]"
            git push
          fi

      - name: Configurar Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Verificar Quarto
        run: quarto check

      - name: Renderizar sitio
        run: quarto render --log-level info

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v6

      - name: Subir sitio para GitHub Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
